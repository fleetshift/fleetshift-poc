syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

import "fleetshift/v1/target_accepted.proto";
import "fleetshift/v1/fleetlet_error.proto";

// ControlInstruction is the envelope for platform-to-fleetlet messages
// on the control channel.
message ControlInstruction {
  oneof instruction {
    TargetAccepted target_accepted = 1;
    FleetletError error = 2;
  }
}
