syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

import "google/api/field_behavior.proto";
import "fleetshift/v1/deployment.proto";

// Request message for
// [DeploymentService.CreateDeployment][fleetshift.v1.DeploymentService.CreateDeployment].
message CreateDeploymentRequest {
  // The ID to use for the deployment, which becomes the final component
  // of the deployment's resource name.
  //
  // This value should be 4-63 characters, and valid characters
  // are /[a-z][0-9]-/.
  string deployment_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The deployment to create.
  Deployment deployment = 2 [(google.api.field_behavior) = REQUIRED];
}
