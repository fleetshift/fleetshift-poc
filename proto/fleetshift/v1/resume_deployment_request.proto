syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

// Request message for
// [DeploymentService.ResumeDeployment][fleetshift.v1.DeploymentService.ResumeDeployment].
message ResumeDeploymentRequest {
  // The resource name of the deployment to resume.
  // Format: deployments/{deployment}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "fleetshift.io/Deployment"
    }
  ];

  // ECDSA-P256-SHA256 signature over sha256(canonical signed envelope).
  // Required when the deployment has Provenance (re-signing).
  bytes user_signature = 2 [(google.api.field_behavior) = OPTIONAL];

  // Client-supplied attestation expiry for envelope reconstruction.
  google.protobuf.Timestamp valid_until = 3 [(google.api.field_behavior) = OPTIONAL];

  // Concurrency control token from the most recent GET. When non-empty,
  // the server verifies the resource has not been modified since the
  // client last observed it, failing with ABORTED if stale.
  string etag = 4 [(google.api.field_behavior) = OPTIONAL];

  // The generation the client expects this mutation to produce
  // (current generation + 1). When user_signature is present the
  // server requires this field and signs it into provenance for
  // anti-replay verification by delivery agents. When absent and
  // unsigned, the server infers next-generation server-side.
  int64 expected_generation = 5 [(google.api.field_behavior) = OPTIONAL];
}
