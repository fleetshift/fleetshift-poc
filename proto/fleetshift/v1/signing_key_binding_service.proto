syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

import "google/api/annotations.proto";
import "google/api/client.proto";
import "fleetshift/v1/signing_key_binding.proto";
import "fleetshift/v1/create_signing_key_binding_request.proto";

// SignerEnrollmentService manages user signer enrollments.
service SignerEnrollmentService {
  // CreateSignerEnrollment enrolls a signer by verifying the ID token
  // and deriving the registry subject via CEL claim mapping.
  rpc CreateSignerEnrollment(CreateSignerEnrollmentRequest) returns (SignerEnrollment) {
    option (google.api.http) = {
      post: "/v1/signerEnrollments"
      body: "*"
    };
    option (google.api.method_signature) = "signer_enrollment_id,identity_token";
  }
}
