syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

import "google/api/field_behavior.proto";
import "fleetshift/v1/registry_subject_mapping.proto";

// OIDCConfig holds OIDC-specific configuration for an authentication method.
message OIDCConfig {
  // The OIDC issuer URL (e.g. "https://accounts.google.com").
  string issuer_url = 1;

  // The expected audience claim in tokens.
  string audience = 2;

  // Server-resolved from OIDC discovery (output only).
  string authorization_endpoint = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Server-resolved from OIDC discovery (output only).
  string token_endpoint = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Server-resolved from OIDC discovery (output only).
  string jwks_uri = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Expected audience for signing key enrollment ID tokens. When set,
  // the server verifies that key binding bundles carry an ID token
  // with this audience, isolating enrollment tokens from platform
  // access tokens and managed cluster tokens.
  string key_enrollment_audience = 6;

  // CEL expression evaluated over ID token claims to extract the
  // signer's base64-encoded SPKI/PKIX public key (for OIDC key
  // registries). Example: "claims.signing_public_key".
  string public_key_claim_expression = 8;

  // Maps ID token claims to a key registry subject. When set, the
  // delivery agent derives the registry subject from the signer's
  // identity token using this mapping.
  RegistrySubjectMapping registry_subject_mapping = 7;
}
