syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

import "google/api/field_behavior.proto";

// ProducedSecret declares a secret that a delivery produced and that
// the platform should store in the vault.
message ProducedSecret {
  // Reference key for the secret in the vault.
  string ref = 1 [(google.api.field_behavior) = REQUIRED];

  // Opaque secret value.
  bytes value = 2 [(google.api.field_behavior) = REQUIRED];
}
