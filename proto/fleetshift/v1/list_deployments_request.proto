syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

import "google/api/field_behavior.proto";

// Request message for
// [DeploymentService.ListDeployments][fleetshift.v1.DeploymentService.ListDeployments].
message ListDeploymentsRequest {
  // The maximum number of deployments to return. The service may return
  // fewer than this value. If unspecified, at most 50 deployments are
  // returned.
  int32 page_size = 1 [(google.api.field_behavior) = OPTIONAL];

  // A page token received from a previous ListDeployments call. Provide
  // this to retrieve the subsequent page.
  string page_token = 2 [(google.api.field_behavior) = OPTIONAL];
}
