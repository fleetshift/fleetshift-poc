syntax = "proto3";

package fleetshift.v1;

option go_package = "github.com/fleetshift/fleetshift-poc/fleetshift-server/gen/fleetshift/v1;fleetshiftv1";

import "google/protobuf/timestamp.proto";

// Heartbeat is sent periodically by the fleetlet on the Deliver stream
// to indicate liveness. It includes the health status of all connected
// addons so the hub has a single message for the complete health picture.
message Heartbeat {
  string target_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  repeated AddonHealth addon_health = 3;
}

// AddonHealth reports the health of a single addon plugin connected
// to the fleetlet via go-plugin.
message AddonHealth {
  string name = 1;
  bool connected = 2;
  google.protobuf.Timestamp last_collection_time = 3;
  string message = 4;
}
