name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "25 14 * * 1"

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: fleetshift-server/go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go

      - name: Build all modules
        run: |
          for mod in fleetshift-server fleetshift-cli ocp-engine; do
            if [ -d "$mod" ]; then
              echo "Building $mod..."
              (cd "$mod" && go build ./...) # The parentheses run this in a subshell
            else
              echo "Warning: Directory $mod not found, skipping."
            fi
          done

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
