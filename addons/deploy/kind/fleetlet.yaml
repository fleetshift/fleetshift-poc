apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleetlet
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fleetlet
rules:
  # cluster-admin for SSA manifest application
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  # metrics-server access for monitoring sidecar
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["list", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fleetlet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fleetlet
subjects:
  - kind: ServiceAccount
    name: fleetlet
    namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleetlet
  namespace: default
  labels:
    app: fleetlet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fleetlet
  template:
    metadata:
      labels:
        app: fleetlet
    spec:
      serviceAccountName: fleetlet
      volumes:
        - name: plugin-socket
          emptyDir:
            sizeLimit: 1Mi
      containers:
        - name: fleetlet
          image: fleetlet:dev
          args:
            - --platform-addr=fleetshift:50051
            - --target-id=fleetlet-kind-1
            - --target-name=Kind Addon Spike
            - --monitoring-socket=/run/plugins/monitoring.sock
            - --metrics-interval=30s
          volumeMounts:
            - name: plugin-socket
              mountPath: /run/plugins

        - name: monitoring
          image: monitoring-agent:dev
          env:
            - name: CLUSTER_ID
              value: "addon-spike"
            - name: PLUGIN_SOCKET
              value: /run/plugins/monitoring.sock
          volumeMounts:
            - name: plugin-socket
              mountPath: /run/plugins
