apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: monitoringconfigs.monitoring.fleetshift.io
spec:
  group: monitoring.fleetshift.io
  names:
    kind: MonitoringConfig
    plural: monitoringconfigs
    singular: monitoringconfig
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                interval:
                  type: string
                  default: "30s"
                collectNodes:
                  type: boolean
                  default: true
                collectPods:
                  type: boolean
                  default: true
